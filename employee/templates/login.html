<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f6f9;
        }

        .login-container{
            width:400px;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.1);
        }

        .login-container h1{
            text-align:center;
            margin-bottom:10px;
            color:#333;
        }

        .login-container p{
            text-align:center;
            margin-bottom:25px;
            color:gray;
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        .form-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        .form-group input:focus{
            outline:none;
            border-color:#007bff;
        }

        .btn{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        .btn:hover{
            background:#0056b3;
        }

        .forgot{
            text-align:center;
            margin-top:15px;
        }

        .forgot a{
            text-decoration:none;
            color:#007bff;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:gray;
            font-size:14px;
        }

    </style>

</head>
<body>

    <div class="login-container">

        <h1>Employee Portal</h1>
        <p>Login to your account</p>

        <form action="" method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required>
            </div>

            <button type="submit" class="btn">
                Login
            </button>

        </form>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>

        <div class="footer">
            Employee Management System © 2026
        </div>

    </div>

</body>
</html>
